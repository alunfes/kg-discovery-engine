services:
  shadow:
    build:
      context: .
      dockerfile: crypto/Dockerfile.shadow
    image: ghcr.io/alunfes/kg-shadow:latest
    container_name: kg-shadow
    restart: unless-stopped
    environment:
      - SHADOW_DATA_DIR=/data
      - SHADOW_ASSETS=BTC,ETH
      - MARKET_DATA_BASE_URL=http://hype-market-data:8081
    volumes:
      - shadow-data:/data
    networks:
      - default
      - hype-deploy_default
    command: ["--artifact-dir", "/data", "--assets", "BTC", "ETH"]

volumes:
  shadow-data:
    driver: local

networks:
  default:
    driver: bridge
  hype-deploy_default:
    external: true
